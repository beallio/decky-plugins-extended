name: Generate Plugin JSON

on:
  push:
    branches: [ "main" ]
    paths:
      - 'additional_plugins.txt'
      - 'generate_json.py'
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        # No floating v9 major tag is published upstream, so pin the exact version.
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version-file: 'pyproject.toml'

      - name: Run script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run generate_json.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
